[features]
collab = true
collaboration_modes = true

[agents]
max_threads = 4
max_depth = 2

# `config_file` paths below are relative to `.codex/`.
# Example: `agents/rpi_orchestrator.toml` resolves to `.codex/agents/rpi_orchestrator.toml`.

[agents.rpi_orchestrator]
description = "Runs the RPI loop and delegates all executable tasks to subagents."
config_file = "agents/rpi_orchestrator.toml"

[agents.learning_analyst]
description = "Builds LEARNING artifacts and surfaces constraints and unknowns."
config_file = "agents/learning_analyst.toml"

[agents.task_decomposer]
description = "Turns design decisions into dependency-aware executable plans."
config_file = "agents/task_decomposer.toml"

[agents.validator]
description = "Runs required checks in strict order and writes verification evidence."
config_file = "agents/validator.toml"

[agents.reviewer]
description = "Performs evidence-driven review and signs off only on verified work."
config_file = "agents/reviewer.toml"
